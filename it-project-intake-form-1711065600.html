<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 專案需求與 ROI 管理系統 - 升級版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        /* 自訂滾動條讓長內容更美觀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <!-- 頂部導航 -->
    <nav class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">📝 專案需求立項表 (Project Intake Form)</h1>
            <div class="text-sm bg-slate-800 px-3 py-1 rounded-full border border-slate-700">狀態: 草稿 (Draft)</div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto mt-6 px-4">
        <form class="space-y-6">
            
            <!-- 區塊 1：基本資料與 ROI -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-blue-600">
                <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 flex items-center justify-center rounded-full text-sm">1</span> 
                    基本資料與價值評估
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">專案名稱 (Project Name)</label>
                        <input type="text" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：HR 員工假期申請系統自動化">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">提出部門</label>
                        <select class="w-full border border-slate-300 rounded-lg p-2 text-sm outline-none">
                            <option>人力資源部 (HR)</option>
                            <option>財務部 (Finance)</option>
                            <option>營運部 (Operations)</option>
                        </select>
                    </div>
                </div>
                <!-- 價值評估 (濃縮版) -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">💰 預期財務價值 (ROI 分子)</label>
                        <input type="text" class="w-full border border-slate-300 rounded-lg p-2 text-sm outline-none mb-2" placeholder="預估節省金額 / 增加營收 (HKD)">
                        <input type="text" class="w-full border border-slate-300 rounded-lg p-2 text-sm outline-none" placeholder="預估每月節省工時 (FTE Hours)">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">🛡️ 無形價值 / 戰略目標</label>
                        <div class="space-y-2 mt-2">
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" class="rounded text-blue-600"> 解決合規/資安風險 (高優先級)</label>
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" class="rounded text-blue-600"> 提升客戶體驗</label>
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" class="rounded text-blue-600"> 淘汰舊有 Legacy 系統</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 區塊 2：專案詳情與流程 (新增的重點區塊) -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-emerald-500">
                <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                    <span class="bg-emerald-100 text-emerald-700 w-6 h-6 flex items-center justify-center rounded-full text-sm">2</span> 
                    專案背景與工作流程 (Project Details)
                </h2>
                
                <div class="space-y-5">
                    <!-- Project Background -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">📖 專案背景與痛點 (Project Background)</label>
                        <p class="text-xs text-slate-500 mb-2">請描述目前遇到的業務挑戰，以及為什麼現在需要解決這個問題？</p>
                        <textarea class="w-full border border-slate-300 rounded-lg p-3 text-sm outline-none h-24 focus:ring-2 focus:ring-emerald-500" placeholder="例如：目前員工申請假期需要填寫紙本表格，並由經理簽名，經常發生表格遺失或 HR 輸入系統時出錯的情況..."></textarea>
                    </div>

                    <!-- Workflow 對比 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-red-50 p-4 rounded-lg border border-red-100">
                            <label class="block text-sm font-bold text-red-800 mb-1">📉 現有流程 (As-Is Workflow)</label>
                            <p class="text-xs text-red-600 mb-2">目前沒有系統輔助時的操作步驟</p>
                            <textarea class="w-full border border-red-200 rounded p-2 text-sm outline-none h-32 bg-white" placeholder="1. 員工下載 PDF 表格並列印&#10;2. 填寫後交由直屬經理簽名&#10;3. 經理將實體表格交給 HR&#10;4. HR 人手輸入 Excel 紀錄"></textarea>
                        </div>
                        <div class="bg-emerald-50 p-4 rounded-lg border border-emerald-100">
                            <label class="block text-sm font-bold text-emerald-800 mb-1">📈 期望流程 (To-Be Workflow)</label>
                            <p class="text-xs text-emerald-600 mb-2">引入新系統或自動化後的理想步驟</p>
                            <textarea class="w-full border border-emerald-200 rounded p-2 text-sm outline-none h-32 bg-white" placeholder="1. 員工登入網頁提交申請&#10;2. 系統自動發送 Email 給經理審批&#10;3. 經理點擊 Approve 後，系統自動更新 HR 資料庫"></textarea>
                        </div>
                    </div>

                    <!-- 系統依賴 -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">🔗 涉及系統與數據 (System Dependencies)</label>
                        <input type="text" class="w-full border border-slate-300 rounded-lg p-2 text-sm outline-none" placeholder="例如：需要連接現有 ERP 系統讀取員工資料，並支援 Single Sign-On (SSO)">
                    </div>
                </div>
            </div>

            <!-- 底部操作按鈕 -->
            <div class="flex justify-end gap-3 sticky bottom-4 bg-white/80 backdrop-blur p-4 rounded-xl shadow-lg border border-slate-200">
                <button type="button" class="px-6 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg font-medium hover:bg-slate-50 text-sm">
                    💾 儲存草稿
                </button>
                <button type="button" class="px-6 py-2 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-800 text-sm shadow-sm">
                    ✉️ 生成確認連結並發送給部門
                </button>
            </div>

        </form>
    </div>

</body>
</html>
