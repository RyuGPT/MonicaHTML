<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">中三選科策略：數學佳英文一般，以未來就業為導向</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">1. 學生性格特質</label>
                            <select name="Student_Personality" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="內向、喜歡獨立思考與解難">內向、喜歡獨立思考與解難</option>
                                <option value="外向、喜歡與人溝通合作">外向、喜歡與人溝通合作</option>
                                <option value="實幹型、喜歡動手做或操作">實幹型、喜歡動手做或操作</option>
                                <option value="創意型、喜歡設計與發想">創意型、喜歡設計與發想</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">2. 目標行業大方向</label>
                            <select name="Target_Career_Direction" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="資訊科技 / 程式開發 / 數據分析">資訊科技 / 程式開發 / 數據分析</option>
                                <option value="工程 / 測量 / 建築">工程 / 測量 / 建築</option>
                                <option value="金融 / 會計 / 商業分析">金融 / 會計 / 商業分析</option>
                                <option value="醫療保健 / 護理 / 專職醫療">醫療保健 / 護理 / 專職醫療</option>
                                <option value="設計 / 多媒體 / 創意產業">設計 / 多媒體 / 創意產業</option>
                                <option value="紀律部隊 / 公務員">紀律部隊 / 公務員</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">3. 數學強項的具體表現</label>
                            <select name="Math_Strength_Type" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="運算速度快、對數字敏感">運算速度快、對數字敏感</option>
                                <option value="邏輯推理想像力強、擅長解難">邏輯推理想像力強、擅長解難</option>
                                <option value="空間感好、擅長幾何圖形">空間感好、擅長幾何圖形</option>
                                <option value="只要有公式就能套用得很好">只要有公式就能套用得很好</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">4. 英文「一般」的具體情況</label>
                            <select name="English_Weakness_Specifics" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="閱讀理解尚可，但極怕寫作">閱讀理解尚可，但極怕寫作</option>
                                <option value="文法較弱，但敢於開口說話">文法較弱，但敢於開口說話</option>
                                <option value="詞彙量不足，全方位都需要補底">詞彙量不足，全方位都需要補底</option>
                                <option value="僅能應付日常溝通，學術英語吃力">僅能應付日常溝通，學術英語吃力</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">5. 期望的升學途徑</label>
                            <select name="Expected_Education_Path" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="本地大學學位 (八大)">本地大學學位 (八大)</option>
                                <option value="本地高級文憑/副學士 (如 IVE/HKCC) 接駁">本地高級文憑/副學士 (如 IVE/HKCC) 接駁</option>
                                <option value="海外升學 (如英澳加)">海外升學 (如英澳加)</option>
                                <option value="中六畢業後直接就業或學徒計劃">中六畢業後直接就業或學徒計劃</option>
                            </select>
                        </div>

                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">6. 理科選修意向</label>
                            <select name="Science_Electives" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="強烈傾向物理 (Physics)">強烈傾向物理 (Physics)</option>
                                <option value="強烈傾向化學 (Chemistry)">強烈傾向化學 (Chemistry)</option>
                                <option value="強烈傾向生物 (Biology)">強烈傾向生物 (Biology)</option>
                                <option value="抗拒傳統理科">抗拒傳統理科</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">7. 商科/科技選修意向</label>
                            <select name="Business_Tech_Electives" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="對企會財 (BAFS) 有興趣">對企會財 (BAFS) 有興趣</option>
                                <option value="對經濟 (Economics) 有興趣">對經濟 (Economics) 有興趣</option>
                                <option value="對資訊及通訊科技 (ICT) 有興趣">對資訊及通訊科技 (ICT) 有興趣</option>
                                <option value="無特別傾向">無特別傾向</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">8. 延伸數學 (M1/M2) 意向</label>
                            <div class="flex gap-4 mt-1">
                                <label class="flex items-center"><input type="radio" name="Extended_Math" value="考慮修讀 M1 (微積分與統計)" class="mr-2 text-indigo-600"> 考慮 M1</label>
                                <label class="flex items-center"><input type="radio" name="Extended_Math" value="考慮修讀 M2 (代數與微積分)" class="mr-2 text-indigo-600"> 考慮 M2</label>
                                <label class="flex items-center"><input type="radio" name="Extended_Math" value="不考慮延伸數學" class="mr-2 text-indigo-600"> 不考慮</label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">9. 學習模式偏好</label>
                            <select name="Learning_Style" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="考試主導，喜歡操練 Past Paper">考試主導，喜歡操練 Past Paper</option>
                                <option value="專題研習 (Project-based)，喜歡實作">專題研習 (Project-based)，喜歡實作</option>
                                <option value="兩者皆可">兩者皆可</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">10. 對背誦科目的接受度</label>
                            <div class="flex gap-4 mt-1">
                                <label class="flex items-center"><input type="radio" name="Memorization_Tolerance" value="高 (不介意大量背誦)" class="mr-2 text-indigo-600"> 高</label>
                                <label class="flex items-center"><input type="radio" name="Memorization_Tolerance" value="中等" class="mr-2 text-indigo-600"> 中等</label>
                                <label class="flex items-center"><input type="radio" name="Memorization_Tolerance" value="低 (極度抗拒死記硬背)" class="mr-2 text-indigo-600"> 低</label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">11. 對長篇寫作科目的接受度</label>
                            <div class="flex gap-4 mt-1">
                                <label class="flex items-center"><input type="radio" name="Essay_Tolerance" value="可以接受" class="mr-2 text-indigo-600"> 可以接受</label>
                                <label class="flex items-center"><input type="radio" name="Essay_Tolerance" value="盡量避免" class="mr-2 text-indigo-600"> 盡量避免</label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">12. 核心工作價值觀</label>
                            <select name="Core_Work_Values" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="追求高收入與晉升機會">追求高收入與晉升機會</option>
                                <option value="追求穩定性 (如鐵飯碗/專業資格)">追求穩定性 (如鐵飯碗/專業資格)</option>
                                <option value="追求工作與生活平衡 (Work-life balance)">追求工作與生活平衡 (Work-life balance)</option>
                                <option value="追求個人興趣與成就感">追求個人興趣與成就感</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">13. 面對考試的抗壓能力</label>
                            <select name="Exam_Stress_Tolerance" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                                <option value="">請選擇...</option>
                                <option value="高 (遇強愈強)">高 (遇強愈強)</option>
                                <option value="中 (正常發揮)">中 (正常發揮)</option>
                                <option value="低 (容易失準，較適合持續評估)">低 (容易失準，較適合持續評估)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">14. 未來社會發展趨勢考量</label>
                            <div class="flex flex-col gap-2 mt-1">
                                <label class="flex items-center"><input type="checkbox" name="Future_Trends" value="AI 與自動化" class="mr-2 text-indigo-600 rounded"> AI 與自動化</label>
                                <label class="flex items-center"><input type="checkbox" name="Future_Trends" value="人口老化與醫療需求" class="mr-2 text-indigo-600 rounded"> 人口老化與醫療需求</label>
                                <label class="flex items-center"><input type="checkbox" name="Future_Trends" value="綠色經濟與 ESG" class="mr-2 text-indigo-600 rounded"> 綠色經濟與 ESG</label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">15. 補充說明 / 特殊情況</label>
                            <textarea name="Additional_Context" rows="2" class="w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" placeholder="例如：小朋友特別喜歡砌模型、家長與小朋友意見不合..."></textarea>
                        </div>

                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 (預設隱藏，撳掣後顯示) -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "中三選科策略：數學佳英文一般，以未來就業為導向";
            
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    let readableKey = key.replace(/_/g, ' ');
                    contextParts.push(`### ${readableKey}\n${value}`);
                }
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}

---
## 📋 Context & Requirements
The following details define the scope and style of the response:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
Please act as a world-class expert in education and career counseling in Hong Kong. Analyze the requirements above and provide a comprehensive, high-quality response that strictly adheres to the constraints and tone specified. Suggest specific DSE subject combinations, potential further education paths, and career options.
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "中三選科策略：數學佳英文一般，以未來就業為導向";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            // 1. 準備要複製/分享嘅文字
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        let readableKey = key.replace(/_/g, ' ');
                        details.push(`關於「${readableKey}」請設定為「${value}」`);
                    }
                }
                
                promptText = baseRequest;
                if(details.length > 0) {
                    promptText += `並參考以下條件：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            // 2. 顯示結果框 (雙重保險)
            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            // 3. 執行動作
            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                // 嘗試複製
                try {
                    // 新版 API
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        // 舊版 Fallback
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
</body>
</html>
