<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">分析 Com Sec 由 Pro Firm 轉律師樓的去留問題</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">1. 在律師樓任職時間</label>
                            <select name="任職時間" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="剛入職不到一個月">剛入職不到一個月</option>
                                <option value="1至3個月 (未過試用期)">1至3個月 (未過試用期)</option>
                                <option value="3至6個月 (剛過試用期)">3至6個月 (剛過試用期)</option>
                                <option value="半年以上">半年以上</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">2. 最不習慣的核心原因</label>
                            <select name="不習慣的核心原因" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="工作文化與人事關係 (如：階級觀念重)">工作文化與人事關係 (如：階級觀念重)</option>
                                <option value="工作流程與系統 (如：缺乏指引、要求極度嚴謹)">工作流程與系統 (如：缺乏指引、要求極度嚴謹)</option>
                                <option value="工作量與工時 (如：無止境 OT)">工作量與工時 (如：無止境 OT)</option>
                                <option value="直屬上司或 Partner 的管理風格">直屬上司或 Partner 的管理風格</option>
                                <option value="其他 (請在進階設定補充)">其他</option>
                            </select>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">3. 兩者最大的落差</label>
                            <textarea name="與_Pro_Firm_的最大落差" rows="2" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="例如：Pro firm 較有系統，Law firm 比較 ad-hoc..."></textarea>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">4. 長遠職涯目標 (3-5年)</label>
                            <select name="長遠職涯目標" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="轉戰 In-house 追求穩定">轉戰 In-house 追求穩定</option>
                                <option value="晉升為 Manager/Director">晉升為 Manager/Director</option>
                                <option value="追求 Work-Life Balance">追求 Work-Life Balance</option>
                                <option value="累積特定經驗 (如 IPO, 併購)">累積特定經驗 (如 IPO, 併購)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">5. 期望 AI 提供的協助</label>
                            <select name="期望_AI_協助" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="客觀的去留利弊分析 (Pros & Cons)">客觀的去留利弊分析 (Pros & Cons)</option>
                                <option value="適應律師樓文化的實用建議">適應律師樓文化的實用建議</option>
                                <option value="下一步轉職策略與履歷建議">下一步轉職策略與履歷建議</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">6. 薪酬與福利變化</label>
                            <select name="薪酬變化" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="顯著增加 (加薪 > 15%)">顯著增加 (加薪 > 15%)</option>
                                <option value="輕微增加">輕微增加</option>
                                <option value="平手 (平調)">平手 (平調)</option>
                                <option value="減少但預期前景更好">減少但預期前景更好</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">7. 目前工時狀況</label>
                            <select name="工時狀況" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="準時收工">準時收工</option>
                                <option value="偶爾 OT (每週 < 5 小時)">偶爾 OT (每週 < 5 小時)</option>
                                <option value="經常 OT (每週 5-10 小時)">經常 OT (每週 5-10 小時)</option>
                                <option value="嚴重 OT (每週 > 10 小時)">嚴重 OT (每週 > 10 小時)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">8. 團隊規模與支援</label>
                            <select name="團隊支援" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="有充足 Senior 帶領及支援">有充足 Senior 帶領及支援</option>
                                <option value="團隊人手緊絀，需獨立作戰">團隊人手緊絀，需獨立作戰</option>
                                <option value="One-man band (一人部門)">One-man band (一人部門)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">9. 處理的客戶類型</label>
                            <input type="text" name="客戶類型" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="例如：上市公司、私人企業、NGO...">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">10. 律師樓內部地位</label>
                            <select name="部門地位" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="核心盈利部門，受重視">核心盈利部門，受重視</option>
                                <option value="輔助性質，配合律師工作為主">輔助性質，配合律師工作為主</option>
                                <option value="地位邊緣化">地位邊緣化</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">11. 個人壓力指數 (1-10)</label>
                            <input type="number" name="壓力指數" min="1" max="10" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="10 為極度崩潰">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">12. 財務負擔與裸辭準備</label>
                            <select name="裸辭準備" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="儲蓄充足，可隨時裸辭">儲蓄充足，可隨時裸辭</option>
                                <option value="可支撐 3-6 個月">可支撐 3-6 個月</option>
                                <option value="財務壓力大，必須騎牛搵馬">財務壓力大，必須騎牛搵馬</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">13. 潛在退路偏好</label>
                            <select name="潛在退路" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="重返 Pro Firm">重返 Pro Firm</option>
                                <option value="轉戰 In-house">轉戰 In-house</option>
                                <option value="轉行">轉行</option>
                            </select>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">14. 學習與成長空間</label>
                            <textarea name="學習空間" rows="2" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="覺得現時學到的東西有價值嗎？"></textarea>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">15. 溝通模式與文化</label>
                            <textarea name="溝通模式" rows="2" class="w-full p-3 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="與律師/Partner 的溝通有困難嗎？"></textarea>
                        </div>
                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 (預設隱藏，撳掣後顯示) -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "分析 Com Sec 由 Pro Firm 轉律師樓的去留問題";
            
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    let readableKey = key.replace(/_/g, ' ');
                    contextParts.push(`### ${readableKey}\n${value}`);
                }
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}

---
## 📋 Context & Requirements
The following details define the scope and style of the response:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
Please act as a world-class expert in this field. Analyze the requirements above and provide a comprehensive, high-quality response that strictly adheres to the constraints and tone specified.
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "分析 Com Sec 由 Pro Firm 轉律師樓的去留問題";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            // 1. 準備要複製/分享嘅文字
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        let readableKey = key.replace(/_/g, ' ');
                        details.push(`關於「${readableKey}」請設定為「${value}」`);
                    }
                }
                
                promptText = baseRequest;
                if(details.length > 0) {
                    promptText += `並參考以下條件：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            // 2. 顯示結果框 (雙重保險)
            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            // 3. 執行動作
            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                // 嘗試複製
                try {
                    // 新版 API
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        // 舊版 Fallback
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
</body>
</html>
