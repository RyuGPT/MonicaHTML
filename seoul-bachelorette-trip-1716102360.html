<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">首爾5日4夜閨蜜單身旅行行程規劃 (含美容Facial)</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">美容/Facial 類型偏好</label>
                            <select name="Facial_Preference" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="輕醫美 (如流水線保養、水光針、雷射，需時較短)">輕醫美 (如流水線保養、水光針、雷射，需時較短)</option>
                                <option value="高級貴婦 SPA (如雪花秀、后，著重享受與放鬆)">高級貴婦 SPA (如雪花秀、后，著重享受與放鬆)</option>
                                <option value="傳統韓式美容院 (經絡按摩、深層清潔)">傳統韓式美容院 (經絡按摩、深層清潔)</option>
                                <option value="頭皮護理 (近期大熱的韓式 Head Spa)">頭皮護理 (近期大熱的韓式 Head Spa)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">行程節奏與風格</label>
                            <select name="Trip_Pace" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="Chill爆打卡 (每日睡到自然醒，主打Cafe與影相)">Chill爆打卡 (每日睡到自然醒，主打Cafe與影相)</option>
                                <option value="瘋狂血拼 (由朝買到晚，主攻服飾與美妝)">瘋狂血拼 (由朝買到晚，主攻服飾與美妝)</option>
                                <option value="吃貨行程 (以餐廳為主軸，行程圍繞美食)">吃貨行程 (以餐廳為主軸，行程圍繞美食)</option>
                                <option value="平衡型 (每日1-2個主要景點，保留彈性)">平衡型 (每日1-2個主要景點，保留彈性)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">住宿偏好區域</label>
                            <select name="Accommodation_Area" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="弘大/延南洞 (年輕活力，夜生活豐富，去機場方便)">弘大/延南洞 (年輕活力，夜生活豐富，去機場方便)</option>
                                <option value="明洞/乙支路 (傳統購物區，交通樞紐)">明洞/乙支路 (傳統購物區，交通樞紐)</option>
                                <option value="江南/新沙洞 (醫美集中地，高檔精品，時尚Cafe)">江南/新沙洞 (醫美集中地，高檔精品，時尚Cafe)</option>
                                <option value="聖水洞/首爾林 (最新潮流文青區)">聖水洞/首爾林 (最新潮流文青區)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">預算級別 (不含機票住宿)</label>
                            <select name="Budget_Level" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="小資精打細算 (平價美食、地下街購物)">小資精打細算 (平價美食、地下街購物)</option>
                                <option value="中等舒適 (會食幾餐好嘢，適度買名牌/潮牌)">中等舒適 (會食幾餐好嘢，適度買名牌/潮牌)</option>
                                <option value="奢華享受 (為準新娘慶祝，Fine Dining、高級SPA)">奢華享受 (為準新娘慶祝，Fine Dining、高級SPA)</option>
                            </select>
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">必吃美食清單 (可多選或自填)</label>
                            <textarea name="Must_Eat_Foods" rows="2" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="例如：韓牛燒肉、醬油蟹、一隻雞、人參雞湯、特色Cafe甜品..."></textarea>
                        </div>

                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">準新娘驚喜安排</label>
                            <select name="Bride_Surprise" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="無特別安排">無特別安排</option>
                                <option value="訂製專屬蛋糕及佈置酒店房">訂製專屬蛋糕及佈置酒店房</option>
                                <option value="預約韓國專業攝影師影閨蜜婚紗相">預約韓國專業攝影師影閨蜜婚紗相</option>
                                <option value="高級景觀餐廳慶祝晚餐">高級景觀餐廳慶祝晚餐</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">夜生活與晚間活動</label>
                            <select name="Nightlife" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="早睡早起，無夜生活">早睡早起，無夜生活</option>
                                <option value="漢江食公仔麵/炸雞啤酒">漢江食公仔麵/炸雞啤酒</option>
                                <option value="去特色 Cocktail Bar 飲杯嘢">去特色 Cocktail Bar 飲杯嘢</option>
                                <option value="落 Club 狂歡 (弘大/梨泰院/江南)">落 Club 狂歡 (弘大/梨泰院/江南)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">購物重點</label>
                            <div class="space-y-2 mt-2">
                                <label class="flex items-center"><input type="checkbox" name="Shopping_Focus" value="Olive Young/美妝護膚" class="mr-2"> Olive Young/美妝護膚</label>
                                <label class="flex items-center"><input type="checkbox" name="Shopping_Focus" value="韓國本土潮牌 (Mardi, Matin Kim等)" class="mr-2"> 韓國本土潮牌 (Mardi, Matin Kim等)</label>
                                <label class="flex items-center"><input type="checkbox" name="Shopping_Focus" value="地下街平價服飾 (高速巴士/弘大)" class="mr-2"> 地下街平價服飾 (高速巴士/弘大)</label>
                                <label class="flex items-center"><input type="checkbox" name="Shopping_Focus" value="百貨公司/免稅店/精品" class="mr-2"> 百貨公司/免稅店/精品</label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">文化/體驗活動</label>
                            <div class="space-y-2 mt-2">
                                <label class="flex items-center"><input type="checkbox" name="Cultural_Activities" value="租借韓服遊景福宮" class="mr-2"> 租借韓服遊景福宮</label>
                                <label class="flex items-center"><input type="checkbox" name="Cultural_Activities" value="色彩測試 (Personal Color)" class="mr-2"> 色彩測試 (Personal Color)</label>
                                <label class="flex items-center"><input type="checkbox" name="Cultural_Activities" value="DIY 香水/手作坊" class="mr-2"> DIY 香水/手作坊</label>
                                <label class="flex items-center"><input type="checkbox" name="Cultural_Activities" value="韓國猛男秀 (Wild Wild)" class="mr-2"> 韓國猛男秀 (Wild Wild)</label>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">航班首尾日物流安排</label>
                            <select name="Flight_Logistics" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="凌晨機到埗直奔汗蒸幕/24小時餐廳，尾日寄存行李後去機場">凌晨機到埗直奔汗蒸幕/24小時餐廳，尾日寄存行李後去機場</option>
                                <option value="首日先到酒店放行李再出發，尾日包車去機場">首日先到酒店放行李再出發，尾日包車去機場</option>
                                <option value="需要安排機場行李運送服務 (直接送往酒店/機場)">需要安排機場行李運送服務 (直接送往酒店/機場)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">交通方式</label>
                            <select name="Transportation" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="全依賴地鐵/巴士 (最慳錢)">全依賴地鐵/巴士 (最慳錢)</option>
                                <option value="地鐵為主，太攰就搭的士/Kakao T">地鐵為主，太攰就搭的士/Kakao T</option>
                                <option value="全程包車或頻繁搭的士 (最舒服)">全程包車或頻繁搭的士 (最舒服)</option>
                            </select>
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">飲食禁忌與過敏</label>
                            <textarea name="Dietary_Restrictions" rows="2" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="例如：不吃牛、海鮮敏感、素食者... (無則留空)"></textarea>
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700">雨天/室內備案偏好</label>
                            <textarea name="Weather_Backup" rows="2" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="例如：大型商場(The Hyundai Seoul)、室內展覽、多安排幾間Cafe..."></textarea>
                        </div>

                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "首爾5日4夜閨蜜單身旅行行程規劃 (含美容Facial)";
            
            // Handle checkboxes properly
            const checkboxGroups = {};
            
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    // Check if it's a checkbox by seeing if multiple exist
                    const inputs = form.querySelectorAll(`[name="${key}"]`);
                    if(inputs.length > 1 && inputs[0].type === 'checkbox') {
                        if(!checkboxGroups[key]) checkboxGroups[key] = [];
                        checkboxGroups[key].push(value);
                    } else {
                        let readableKey = key.replace(/_/g, ' ');
                        contextParts.push(`### ${readableKey}\n${value}`);
                    }
                }
            }
            
            // Add grouped checkboxes
            for (let key in checkboxGroups) {
                let readableKey = key.replace(/_/g, ' ');
                contextParts.push(`### ${readableKey}\n${checkboxGroups[key].join(', ')}`);
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}
**Background**: 4個女仔，23號凌晨機去韓國首爾，27號夜晚機返香港。其中一個女仔準備結婚，此為婚前單身旅行。

---
## 📋 Context & Requirements
The following details define the scope and style of the itinerary:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
請扮演一位資深的韓國旅遊達人與派對策劃師。根據上述條件，為我們規劃一份詳細的5日4夜首爾行程表。
行程需考慮到凌晨機到達及晚機離開的體力與行李安排，並特別為準新娘設計難忘的環節。請提供每日的早、午、晚行程建議、交通方式提示，以及推薦的餐廳與Facial美容院資訊。
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "首爾5日4夜閨蜜單身旅行行程規劃 (含美容Facial)";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                const checkboxGroups = {};
                
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        const inputs = form.querySelectorAll(`[name="${key}"]`);
                        if(inputs.length > 1 && inputs[0].type === 'checkbox') {
                            if(!checkboxGroups[key]) checkboxGroups[key] = [];
                            checkboxGroups[key].push(value);
                        } else {
                            let readableKey = key.replace(/_/g, ' ');
                            details.push(`關於「${readableKey}」請設定為「${value}」`);
                        }
                    }
                }
                
                for (let key in checkboxGroups) {
                    let readableKey = key.replace(/_/g, ' ');
                    details.push(`關於「${readableKey}」請包含「${checkboxGroups[key].join('、')}」`);
                }
                
                promptText = `任務：${baseRequest}。背景：4個女仔，23號凌晨機去韓國首爾，27號夜晚機返香港。其中一個女仔準備結婚，此為婚前單身旅行。`;
                if(details.length > 0) {
                    promptText += `\n\n請參考以下條件進行規劃：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
</body>
</html>
