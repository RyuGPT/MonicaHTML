<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">規劃 6月7日至13日 九州初遊行程</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">同行人數及關係</label>
                            <select name="Travel_Companions" class="w-full p-2 border border-gray-300 rounded-lg">
                                <option value="">請選擇...</option>
                                <option value="獨自旅行">獨自旅行</option>
                                <option value="情侶/夫妻">情侶/夫妻</option>
                                <option value="朋友出遊 (2-4人)">朋友出遊 (2-4人)</option>
                                <option value="親子遊 (帶小孩)">親子遊 (帶小孩)</option>
                                <option value="孝親遊 (帶長輩)">孝親遊 (帶長輩)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">旅遊預算 (不含機票)</label>
                            <select name="Budget" class="w-full p-2 border border-gray-300 rounded-lg">
                                <option value="">請選擇...</option>
                                <option value="小資窮遊 (每日 $500 HKD 以下)">小資窮遊 (每日 $500 HKD 以下)</option>
                                <option value="中等舒適 (每日 $500-$1500 HKD)">中等舒適 (每日 $500-$1500 HKD)</option>
                                <option value="奢華享受 (每日 $1500 HKD 以上)">奢華享受 (每日 $1500 HKD 以上)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">主要交通方式</label>
                            <div class="flex flex-col gap-2 mt-1">
                                <label class="flex items-center"><input type="radio" name="Transportation" value="全程大眾運輸 (JR/巴士)" class="mr-2"> 大眾運輸 (JR/巴士)</label>
                                <label class="flex items-center"><input type="radio" name="Transportation" value="全程租車自駕" class="mr-2"> 租車自駕</label>
                                <label class="flex items-center"><input type="radio" name="Transportation" value="混合 (部分自駕/部分大眾運輸)" class="mr-2"> 混合搭配</label>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">旅遊步調</label>
                            <select name="Travel_Pace" class="w-full p-2 border border-gray-300 rounded-lg">
                                <option value="">請選擇...</option>
                                <option value="悠閒慢活 (每日 1-2 個景點)">悠閒慢活 (每日 1-2 個景點)</option>
                                <option value="適中充實 (每日 3-4 個景點)">適中充實 (每日 3-4 個景點)</option>
                                <option value="行軍打卡 (每日 5 個以上景點)">行軍打卡 (每日 5 個以上景點)</option>
                            </select>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">必去地區/景點 (可複選)</label>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm mt-1">
                                <label><input type="checkbox" name="Must_Visit" value="福岡市區 (太宰府/天神/博多)" class="mr-1"> 福岡市區</label>
                                <label><input type="checkbox" name="Must_Visit" value="由布院/別府 (溫泉)" class="mr-1"> 由布院/別府</label>
                                <label><input type="checkbox" name="Must_Visit" value="熊本 (熊本熊/阿蘇火山)" class="mr-1"> 熊本/阿蘇</label>
                                <label><input type="checkbox" name="Must_Visit" value="長崎 (豪斯登堡/夜景)" class="mr-1"> 長崎</label>
                                <label><input type="checkbox" name="Must_Visit" value="佐賀 (武雄溫泉/唐津)" class="mr-1"> 佐賀</label>
                                <label><input type="checkbox" name="Must_Visit" value="大分 (九州自然動物園)" class="mr-1"> 大分</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">住宿偏好</label>
                            <select name="Accommodation" class="w-full p-2 border border-gray-300 rounded-lg">
                                <option value="">請選擇...</option>
                                <option value="連鎖商務旅館 (如東橫INN, APA)">連鎖商務旅館</option>
                                <option value="傳統溫泉旅館 (一泊二食)">傳統溫泉旅館 (一泊二食)</option>
                                <option value="特色民宿/Airbnb">特色民宿/Airbnb</option>
                                <option value="高級星級酒店">高級星級酒店</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">輸出格式要求</label>
                            <select name="Output_Format" class="w-full p-2 border border-gray-300 rounded-lg">
                                <option value="表格呈現 (包含時間、景點、交通、備註)">表格呈現 (包含時間、景點、交通、備註)</option>
                                <option value="條列式清單 (詳細文字說明)">條列式清單 (詳細文字說明)</option>
                                <option value="心智圖/大綱結構">心智圖/大綱結構</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">AI 語氣設定</label>
                            <select name="Tone" class="w-full p-2 border border-gray-300 rounded-lg">
                                <option value="專業且具組織性 (適合快速閱讀)">專業且具組織性</option>
                                <option value="熱情導遊風格 (包含有趣的小知識)">熱情導遊風格</option>
                                <option value="精簡扼要 (只給重點)">精簡扼要</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">雨天備案需求 (6月為梅雨季)</label>
                            <div class="flex flex-col gap-2 mt-1">
                                <label class="flex items-center"><input type="radio" name="Rainy_Day_Plan" value="需要詳細雨天備案 (室內景點/購物)" class="mr-2"> 需要詳細備案</label>
                                <label class="flex items-center"><input type="radio" name="Rainy_Day_Plan" value="隨機應變即可" class="mr-2"> 隨機應變</label>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">行李寄放/運送策略</label>
                            <div class="flex flex-col gap-2 mt-1">
                                <label class="flex items-center"><input type="radio" name="Luggage_Strategy" value="需要行李寄放/宅急便建議" class="mr-2"> 需要建議</label>
                                <label class="flex items-center"><input type="radio" name="Luggage_Strategy" value="自行處理" class="mr-2"> 自行處理</label>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-medium text-gray-700">餐廳/交通預約教學</label>
                            <div class="flex flex-col gap-2 mt-1">
                                <label class="flex items-center"><input type="radio" name="Reservation_Guides" value="需要提供熱門餐廳或特色列車預約連結與教學" class="mr-2"> 需要提供</label>
                                <label class="flex items-center"><input type="radio" name="Reservation_Guides" value="不需要" class="mr-2"> 不需要</label>
                            </div>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">班機時間 (若已知)</label>
                            <textarea name="Flight_Schedule" class="w-full p-2 border border-gray-300 rounded-lg" rows="2" placeholder="例如：6/7 早上10點抵達福岡，6/13 下午5點離開..."></textarea>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">飲食偏好與禁忌</label>
                            <textarea name="Dietary_Preferences" class="w-full p-2 border border-gray-300 rounded-lg" rows="2" placeholder="例如：必吃博多拉麵、和牛；不吃生食、素食者..."></textarea>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">購物重點</label>
                            <textarea name="Shopping_Preferences" class="w-full p-2 border border-gray-300 rounded-lg" rows="2" placeholder="例如：藥妝、動漫周邊、名牌精品..."></textarea>
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">體力與活動限制</label>
                            <textarea name="Physical_Constraints" class="w-full p-2 border border-gray-300 rounded-lg" rows="2" placeholder="例如：不能走太多路、需要無障礙設施..."></textarea>
                        </div>
                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 (預設隱藏，撳掣後顯示) -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "規劃 6月7日至13日 九州初遊行程";
            
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    let readableKey = key.replace(/_/g, ' ');
                    contextParts.push(`### ${readableKey}\n${value}`);
                }
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}

---
## 📋 Context & Requirements
The following details define the scope and style of the response:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
Please act as a world-class expert in this field. Analyze the requirements above and provide a comprehensive, high-quality response that strictly adheres to the constraints and tone specified.
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "規劃 6月7日至13日 九州初遊行程";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            // 1. 準備要複製/分享嘅文字
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        let readableKey = key.replace(/_/g, ' ');
                        details.push(`關於「${readableKey}」請設定為「${value}」`);
                    }
                }
                
                promptText = baseRequest;
                if(details.length > 0) {
                    promptText += `並參考以下條件：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            // 2. 顯示結果框 (雙重保險)
            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            // 3. 執行動作
            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                // 嘗試複製
                try {
                    // 新版 API
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        // 舊版 Fallback
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
</body>
</html>
