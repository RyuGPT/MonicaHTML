<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">東京7日旅行行程</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">旅遊季節與月份</label>
                            <select name="Travel_Season" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">請選擇...</option>
                                <option value="春季 (賞櫻/氣候溫和)">春季 (賞櫻/氣候溫和)</option>
                                <option value="夏季 (祭典/花火大會)">夏季 (祭典/花火大會)</option>
                                <option value="秋季 (賞楓/銀杏)">秋季 (賞楓/銀杏)</option>
                                <option value="冬季 (聖誕燈飾/雪景)">冬季 (聖誕燈飾/雪景)</option>
                                <option value="不指定/尚未決定">不指定/尚未決定</option>
                            </select>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">旅伴組合</label>
                            <select name="Companions" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">請選擇...</option>
                                <option value="獨自旅行">獨自旅行</option>
                                <option value="情侶/夫妻">情侶/夫妻</option>
                                <option value="親子家庭 (有小孩)">親子家庭 (有小孩)</option>
                                <option value="帶長輩同行">帶長輩同行</option>
                                <option value="朋友群體">朋友群體</option>
                            </select>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">預算等級 (不含機票住宿)</label>
                            <select name="Budget_Level" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">請選擇...</option>
                                <option value="小資窮遊 (精打細算)">小資窮遊 (精打細算)</option>
                                <option value="舒適中等 (該花就花)">舒適中等 (該花就花)</option>
                                <option value="豪華享受 (米其林/高級體驗)">豪華享受 (米其林/高級體驗)</option>
                                <option value="無預算上限">無預算上限</option>
                            </select>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">住宿區域偏好</label>
                            <select name="Accommodation_Area" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="">請選擇...</option>
                                <option value="新宿/澀谷 (繁華夜生活)">新宿/澀谷 (繁華夜生活)</option>
                                <option value="上野/淺草 (交通方便/傳統風情)">上野/淺草 (交通方便/傳統風情)</option>
                                <option value="銀座/東京車站 (高級/購物便利)">銀座/東京車站 (高級/購物便利)</option>
                                <option value="池袋 (動漫/購物)">池袋 (動漫/購物)</option>
                                <option value="尚未決定 (請AI建議)">尚未決定 (請AI建議)</option>
                            </select>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">核心旅遊風格 (可複選)</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Travel_Style" value="歷史文化/神社寺廟" class="rounded text-indigo-600 focus:ring-indigo-500"><span>歷史文化</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Travel_Style" value="動漫次文化" class="rounded text-indigo-600 focus:ring-indigo-500"><span>動漫次文化</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Travel_Style" value="逛街購物" class="rounded text-indigo-600 focus:ring-indigo-500"><span>逛街購物</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Travel_Style" value="自然風景" class="rounded text-indigo-600 focus:ring-indigo-500"><span>自然風景</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Travel_Style" value="美食探索" class="rounded text-indigo-600 focus:ring-indigo-500"><span>美食探索</span></label>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        
                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">行程節奏</label>
                            <div class="flex gap-4">
                                <label class="flex items-center space-x-2"><input type="radio" name="Pace" value="緊湊打卡 (盡可能多去景點)" class="text-purple-600 focus:ring-purple-500"><span>緊湊打卡</span></label>
                                <label class="flex items-center space-x-2"><input type="radio" name="Pace" value="適中平衡 (每天2-3個主要景點)" class="text-purple-600 focus:ring-purple-500"><span>適中平衡</span></label>
                                <label class="flex items-center space-x-2"><input type="radio" name="Pace" value="慵懶慢活 (睡到自然醒，隨性走)" class="text-purple-600 focus:ring-purple-500"><span>慵懶慢活</span></label>
                            </div>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">主題樂園與近郊行程 (可複選)</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="東京迪士尼樂園" class="rounded text-purple-600 focus:ring-purple-500"><span>迪士尼樂園</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="東京迪士尼海洋" class="rounded text-purple-600 focus:ring-purple-500"><span>迪士尼海洋</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="哈利波特影城" class="rounded text-purple-600 focus:ring-purple-500"><span>哈利波特影城</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="富士山/河口湖" class="rounded text-purple-600 focus:ring-purple-500"><span>富士山/河口湖</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="鎌倉/江之島" class="rounded text-purple-600 focus:ring-purple-500"><span>鎌倉/江之島</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="橫濱" class="rounded text-purple-600 focus:ring-purple-500"><span>橫濱</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Theme_Parks_Suburbs" value="輕井澤" class="rounded text-purple-600 focus:ring-purple-500"><span>輕井澤</span></label>
                            </div>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">航班時間</label>
                            <select name="Flight_Schedule" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white">
                                <option value="">請選擇...</option>
                                <option value="早去晚回 (玩好玩滿)">早去晚回 (玩好玩滿)</option>
                                <option value="早去早回">早去早回</option>
                                <option value="晚去晚回">晚去晚回</option>
                                <option value="晚去早回">晚去早回</option>
                                <option value="尚未決定">尚未決定</option>
                            </select>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">交通票券偏好</label>
                            <select name="Transportation" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white">
                                <option value="">請選擇...</option>
                                <option value="主要使用地鐵乘車券 (Tokyo Subway Ticket)">地鐵乘車券為主</option>
                                <option value="主要使用 JR Pass (廣域券等)">JR Pass 為主</option>
                                <option value="隨意刷 Suica/Pasmo (不買通票)">隨意刷 IC 卡</option>
                                <option value="考慮包車或計程車代步">包車/計程車</option>
                            </select>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">體力與步行限制</label>
                            <div class="flex gap-4 flex-wrap">
                                <label class="flex items-center space-x-2"><input type="radio" name="Physical_Condition" value="健步如飛 (日走2萬步沒問題)" class="text-purple-600 focus:ring-purple-500"><span>健步如飛 (日走2萬步)</span></label>
                                <label class="flex items-center space-x-2"><input type="radio" name="Physical_Condition" value="一般體力 (日走1萬步左右)" class="text-purple-600 focus:ring-purple-500"><span>一般體力 (日走1萬步)</span></label>
                                <label class="flex items-center space-x-2"><input type="radio" name="Physical_Condition" value="需常休息 (有長輩/幼童/不耐走)" class="text-purple-600 focus:ring-purple-500"><span>需常休息 (不耐走)</span></label>
                            </div>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">晚間活動安排 (可複選)</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Evening_Activities" value="居酒屋/深夜食堂" class="rounded text-purple-600 focus:ring-purple-500"><span>居酒屋/深夜食堂</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Evening_Activities" value="觀景台看夜景" class="rounded text-purple-600 focus:ring-purple-500"><span>觀景台看夜景</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Evening_Activities" value="逛驚安殿堂/超市" class="rounded text-purple-600 focus:ring-purple-500"><span>逛驚安殿堂/超市</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Evening_Activities" value="酒吧/夜店" class="rounded text-purple-600 focus:ring-purple-500"><span>酒吧/夜店</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Evening_Activities" value="早早回飯店休息" class="rounded text-purple-600 focus:ring-purple-500"><span>早早回飯店休息</span></label>
                            </div>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">特殊文化體驗 (可複選)</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Cultural_Experiences" value="和服/浴衣體驗" class="rounded text-purple-600 focus:ring-purple-500"><span>和服/浴衣體驗</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Cultural_Experiences" value="溫泉/錢湯體驗" class="rounded text-purple-600 focus:ring-purple-500"><span>溫泉/錢湯體驗</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Cultural_Experiences" value="茶道/花道/手作課程" class="rounded text-purple-600 focus:ring-purple-500"><span>茶道/手作課程</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Cultural_Experiences" value="觀賞相撲/歌舞伎" class="rounded text-purple-600 focus:ring-purple-500"><span>觀賞相撲/歌舞伎</span></label>
                            </div>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">購物重點 (可複選)</label>
                            <div class="flex flex-wrap gap-4">
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Shopping_Focus" value="藥妝/保養品" class="rounded text-purple-600 focus:ring-purple-500"><span>藥妝/保養品</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Shopping_Focus" value="服飾/潮牌/精品" class="rounded text-purple-600 focus:ring-purple-500"><span>服飾/潮牌/精品</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Shopping_Focus" value="動漫/遊戲周邊" class="rounded text-purple-600 focus:ring-purple-500"><span>動漫/遊戲周邊</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Shopping_Focus" value="3C/家電" class="rounded text-purple-600 focus:ring-purple-500"><span>3C/家電</span></label>
                                <label class="flex items-center space-x-2"><input type="checkbox" name="Shopping_Focus" value="特色伴手禮/零食" class="rounded text-purple-600 focus:ring-purple-500"><span>特色伴手禮</span></label>
                            </div>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">攝影打卡偏好</label>
                            <select name="Photography" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white">
                                <option value="">請選擇...</option>
                                <option value="專業攝影 (需安排日出/日落/特殊機位)">專業攝影 (需安排光線/機位)</option>
                                <option value="網美打卡 (需要漂亮咖啡廳/IG熱點)">網美打卡 (IG熱點)</option>
                                <option value="隨手紀錄即可 (不特別安排)">隨手紀錄即可</option>
                            </select>
                        </div>

                        <div class="flex flex-col">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">備案彈性</label>
                            <select name="Backup_Plan" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white">
                                <option value="">請選擇...</option>
                                <option value="需要詳細雨天備案">需要詳細雨天備案</option>
                                <option value="隨機應變即可 (不需特別寫出)">隨機應變即可</option>
                            </select>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">必吃美食類型 (例如：壽司、燒肉、拉麵等)</label>
                            <textarea name="Must_Eat_Food" rows="2" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white" placeholder="請輸入想吃的美食..."></textarea>
                        </div>

                        <div class="flex flex-col md:col-span-2">
                            <label class="mb-2 font-semibold text-gray-700 text-sm">飲食禁忌或特殊需求 (例如：素食、不吃牛、海鮮過敏等)</label>
                            <textarea name="Dietary_Restrictions" rows="2" class="p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none bg-white" placeholder="請輸入飲食禁忌..."></textarea>
                        </div>

                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 (預設隱藏，撳掣後顯示) -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "東京7日旅行行程";
            
            // Handle multiple checkboxes with same name
            const dataObj = {};
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    if (dataObj[key]) {
                        dataObj[key].push(value);
                    } else {
                        dataObj[key] = [value];
                    }
                }
            }

            for (let key in dataObj) {
                let readableKey = key.replace(/_/g, ' ');
                let valueStr = dataObj[key].join(', ');
                contextParts.push(`### ${readableKey}\n${valueStr}`);
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}

---
## 📋 Context & Requirements
The following details define the scope and style of the response:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
Please act as a world-class expert in this field. Analyze the requirements above and provide a comprehensive, high-quality response that strictly adheres to the constraints and tone specified.
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "東京7日旅行行程";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            // 1. 準備要複製/分享嘅文字
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                
                const dataObj = {};
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        if (dataObj[key]) {
                            dataObj[key].push(value);
                        } else {
                            dataObj[key] = [value];
                        }
                    }
                }

                for (let key in dataObj) {
                    let readableKey = key.replace(/_/g, ' ');
                    let valueStr = dataObj[key].join('、');
                    details.push(`關於「${readableKey}」請設定為「${valueStr}」`);
                }
                
                promptText = baseRequest;
                if(details.length > 0) {
                    promptText += `並參考以下條件：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            // 2. 顯示結果框 (雙重保險)
            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            // 3. 執行動作
            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                // 嘗試複製
                try {
                    // 新版 API
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        // 舊版 Fallback
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
