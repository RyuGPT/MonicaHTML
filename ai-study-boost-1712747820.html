<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">可以點用 AI 幫我個仔讀書成績好啲</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">小朋友年級/年齡</label>
                            <select name="Student_Grade_Level" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="幼稚園 (K1-K3)">幼稚園 (K1-K3)</option>
                                <option value="初小 (小一至小三)">初小 (小一至小三)</option>
                                <option value="高小 (小四至小六)">高小 (小四至小六)</option>
                                <option value="初中 (中一至中三)">初中 (中一至中三)</option>
                                <option value="高中 (中四至中六)">高中 (中四至中六)</option>
                                <option value="大專/大學或以上">大專/大學或以上</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">目標提升科目</label>
                            <input type="text" name="Target_Subjects" placeholder="例如：數學、英文、常識、理科..." class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">目前學習狀況</label>
                            <select name="Current_Academic_Status" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="基礎薄弱，跟不上進度">基礎薄弱，跟不上進度</option>
                                <option value="成績平平，缺乏突破">成績平平，缺乏突破</option>
                                <option value="成績優異，想進一步拔尖">成績優異，想進一步拔尖</option>
                                <option value="有特定學習困難 (如讀寫障礙、專注力不足)">有特定學習困難 (如 SEN)</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">主要期望目標</label>
                            <select name="Main_Goal" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="提高考試分數及名次">提高考試分數及名次</option>
                                <option value="提升學習興趣及主動性">提升學習興趣及主動性</option>
                                <option value="協助完成日常功課">協助完成日常功課</option>
                                <option value="針對測驗/考試進行重點複習">針對測驗/考試進行重點複習</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">家長參與程度</label>
                            <select name="Parent_Involvement" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="高度參與：我想和孩子一起使用 AI 學習">高度參與：我想和孩子一起使用 AI 學習</option>
                                <option value="中度參與：我負責設定，孩子自己操作">中度參與：我負責設定，孩子自己操作</option>
                                <option value="低度參與：希望 AI 能完全引導孩子獨立學習">低度參與：希望 AI 能完全引導孩子獨立學習</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">小朋友學習風格</label>
                            <select name="Learning_Style" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="視覺型 (喜歡看圖表、影片、顏色標記)">視覺型 (喜歡看圖表、影片、顏色標記)</option>
                                <option value="聽覺型 (喜歡聽講解、討論、口訣)">聽覺型 (喜歡聽講解、討論、口訣)</option>
                                <option value="動覺型 (喜歡動手做、實驗、角色扮演)">動覺型 (喜歡動手做、實驗、角色扮演)</option>
                                <option value="讀寫型 (喜歡閱讀文字、做筆記)">讀寫型 (喜歡閱讀文字、做筆記)</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">學習動機與態度</label>
                            <select name="Student_Motivation" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="非常抗拒學習">非常抗拒學習</option>
                                <option value="被動，需要推動">被動，需要推動</option>
                                <option value="一般，視乎科目">一般，視乎科目</option>
                                <option value="主動且充滿好奇心">主動且充滿好奇心</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">具體學習困難 (可多選/填寫)</label>
                            <textarea name="Specific_Challenges" rows="2" placeholder="例如：容易分心、害怕答錯、不理解抽象概念、背誦困難..." class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow"></textarea>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">家長對 AI 的熟悉度</label>
                            <select name="Parent_Tech_Proficiency" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="新手：從未使用過 ChatGPT 等工具">新手：從未使用過 ChatGPT 等工具</option>
                                <option value="初階：間中使用，只會簡單問答">初階：間中使用，只會簡單問答</option>
                                <option value="進階：懂得寫 Prompt 及使用不同功能">進階：懂得寫 Prompt 及使用不同功能</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">每日可分配時間</label>
                            <select name="Time_Commitment" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="15-30 分鐘">15-30 分鐘</option>
                                <option value="30-60 分鐘">30-60 分鐘</option>
                                <option value="1-2 小時">1-2 小時</option>
                                <option value="只限週末">只限週末</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">主要教學/溝通語言</label>
                            <select name="Language_of_Instruction" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="繁體中文 (廣東話口吻)">繁體中文 (廣東話口吻)</option>
                                <option value="繁體中文 (書面語)">繁體中文 (書面語)</option>
                                <option value="英文">英文</option>
                                <option value="中英雙語">中英雙語</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">期望 AI 扮演的角色/語氣</label>
                            <select name="AI_Tutor_Tone" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="蘇格拉底式 (不斷提問引導思考，不直接給答案)">蘇格拉底式 (不斷提問引導思考，不直接給答案)</option>
                                <option value="溫柔鼓勵型 (多讚賞，耐心解釋)">溫柔鼓勵型 (多讚賞，耐心解釋)</option>
                                <option value="幽默有趣型 (用故事、比喻、笑話教學)">幽默有趣型 (用故事、比喻、笑話教學)</option>
                                <option value="嚴格教練型 (著重紀律、效率、測驗)">嚴格教練型 (著重紀律、效率、測驗)</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">希望獲得的建議格式</label>
                            <select name="Output_Format" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="具體操作步驟與家長 Prompt 範本">具體操作步驟與家長 Prompt 範本</option>
                                <option value="每週學習時間表規劃">每週學習時間表規劃</option>
                                <option value="推薦的 AI 工具清單及用法">推薦的 AI 工具清單及用法</option>
                                <option value="綜合全方位策略報告">綜合全方位策略報告</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">螢幕時間限制</label>
                            <select name="Screen_Time_Limits" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="嚴格限制 (希望 AI 協助生成紙本練習)">嚴格限制 (希望 AI 協助生成紙本練習)</option>
                                <option value="適度限制 (可接受短時間線上互動)">適度限制 (可接受短時間線上互動)</option>
                                <option value="無特別限制">無特別限制</option>
                            </select>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-sm font-semibold text-gray-700">偏好的評估方式</label>
                            <select name="Assessment_Method" class="w-full p-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow">
                                <option value="">請選擇...</option>
                                <option value="選擇題/填充題小測驗">選擇題/填充題小測驗</option>
                                <option value="讓孩子口頭解釋概念">讓孩子口頭解釋概念</option>
                                <option value="專題研習/動手做任務">專題研習/動手做任務</option>
                                <option value="不需要評估，純粹輔助理解">不需要評估，純粹輔助理解</option>
                            </select>
                        </div>
                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 (預設隱藏，撳掣後顯示) -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "可以點用 AI 幫我個仔讀書成績好啲";
            
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    let readableKey = key.replace(/_/g, ' ');
                    contextParts.push(`### ${readableKey}\n${value}`);
                }
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}

---
## 📋 Context & Requirements
The following details define the scope and style of the response:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
Please act as a world-class expert in this field. Analyze the requirements above and provide a comprehensive, high-quality response that strictly adheres to the constraints and tone specified.
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "可以點用 AI 幫我個仔讀書成績好啲";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            // 1. 準備要複製/分享嘅文字
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        let readableKey = key.replace(/_/g, ' ');
                        details.push(`關於「${readableKey}」請設定為「${value}」`);
                    }
                }
                
                promptText = baseRequest;
                if(details.length > 0) {
                    promptText += `並參考以下條件：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            // 2. 顯示結果框 (雙重保險)
            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            // 3. 執行動作
            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                // 嘗試複製
                try {
                    // 新版 API
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        // 舊版 Fallback
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
</body>
</html>
