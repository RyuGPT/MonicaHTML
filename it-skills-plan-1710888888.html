<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全方位指令架構師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4F46E5;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4F46E5;
        }
        #advanced-section {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        
        <!-- Header -->
        <div class="bg-indigo-900 p-8 text-white">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">AI 全方位指令架構師</h1>
                    <p class="text-indigo-200 mt-2">優化目標：<span class="font-semibold text-white border-b border-indigo-400 pb-1">我點樣進步我既IT skills & knowledge 3day/wk, 每日1hr</span></p>
                </div>
                <!-- Mode Toggle -->
                <div class="flex items-center bg-indigo-800 rounded-lg p-1">
                    <button type="button" onclick="setMode('simple')" id="btn-simple" class="px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm">快速評估</button>
                    <button type="button" onclick="setMode('detailed')" id="btn-detailed" class="px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white">深度分析 (20+ 參數)</button>
                </div>
            </div>
        </div>

        <div class="p-8">
            <form id="prompt-form" class="space-y-8">
                
                <!-- SECTION 1: ESSENTIAL (Always Visible) -->
                <div>
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        核心參數 (必填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">目前 IT 技能水平</label>
                            <select name="Current_Level" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="零基礎新手 (小白)">零基礎新手 (小白)</option>
                                <option value="初階 (懂基本概念，能寫簡單腳本)">初階 (懂基本概念，能寫簡單腳本)</option>
                                <option value="中階 (有實作經驗，想深化特定領域)">中階 (有實作經驗，想深化特定領域)</option>
                                <option value="高階 (尋求架構設計或前沿技術)">高階 (尋求架構設計或前沿技術)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">想專攻的 IT 領域</label>
                            <select name="Target_Domain" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="網頁開發 (前端/後端/全端)">網頁開發 (前端/後端/全端)</option>
                                <option value="數據分析 / 人工智能 (AI/ML)">數據分析 / 人工智能 (AI/ML)</option>
                                <option value="雲端運算 / DevOps (AWS/GCP/Docker)">雲端運算 / DevOps (AWS/GCP/Docker)</option>
                                <option value="網絡安全 (Cybersecurity)">網絡安全 (Cybersecurity)</option>
                                <option value="手機 App 開發 (iOS/Android)">手機 App 開發 (iOS/Android)</option>
                                <option value="一般 IT 基礎 (網絡、系統管理)">一般 IT 基礎 (網絡、系統管理)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">學習的最終目標</label>
                            <input type="text" name="Learning_Goal" placeholder="例如：轉職軟體工程師、加薪、自己做個App..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">偏好的學習方式</label>
                            <select name="Learning_Style" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="實作導向 (邊做 Project 邊學)">實作導向 (邊做 Project 邊學)</option>
                                <option value="影片教學 (看 YouTube / Udemy)">影片教學 (看 YouTube / Udemy)</option>
                                <option value="閱讀導向 (看官方文件、技術博客、書籍)">閱讀導向 (看官方文件、技術博客、書籍)</option>
                                <option value="解題導向 (刷 LeetCode / 參加 CTF)">解題導向 (刷 LeetCode / 參加 CTF)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">期望的產出/成果</label>
                            <select name="Expected_Deliverable" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="每週學習筆記/總結">每週學習筆記/總結</option>
                                <option value="累積 GitHub 個人作品集 (Portfolio)">累積 GitHub 個人作品集 (Portfolio)</option>
                                <option value="考取專業證照 (如 AWS 證照)">考取專業證照 (如 AWS 證照)</option>
                                <option value="純知識吸收，無須具體產出">純知識吸收，無須具體產出</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECTION 2: DEEP DIVE (Hidden by default) -->
                <div id="advanced-section" class="hidden">
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center" aria-hidden="true">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center">
                            <span class="bg-white px-3 text-sm font-medium text-gray-500">進階詳細設定</span>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="bg-purple-100 text-purple-700 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        深度微調參數 (選填)
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-gray-50 rounded-xl border border-gray-200">
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">偏好語言/工具 (如有)</label>
                            <input type="text" name="Preferred_Tools" placeholder="例如：Python, React, Linux..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">學習預算</label>
                            <select name="Budget" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="零成本 (全依賴免費資源)">零成本 (全依賴免費資源)</option>
                                <option value="小額付費 (買 Udemy 課程或書籍)">小額付費 (買 Udemy 課程或書籍)</option>
                                <option value="願意投資 (訂閱制平台或報名訓練班)">願意投資 (訂閱制平台或報名訓練班)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">作業系統環境</label>
                            <div class="flex gap-4 mt-2">
                                <label class="flex items-center"><input type="radio" name="OS_Environment" value="Windows" class="mr-2"> Windows</label>
                                <label class="flex items-center"><input type="radio" name="OS_Environment" value="macOS" class="mr-2"> macOS</label>
                                <label class="flex items-center"><input type="radio" name="OS_Environment" value="Linux" class="mr-2"> Linux</label>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">偏好學習日</label>
                            <input type="text" name="Preferred_Days" placeholder="例如：星期一、三、五晚上" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">短期里程碑 (3個月)</label>
                            <input type="text" name="Short_Term_Milestone" placeholder="例如：完成一個簡單的網頁" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">督促方式</label>
                            <select name="Accountability" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="完全自律">完全自律</option>
                                <option value="在社交媒體/博客公開進度 (#100DaysOfCode)">在社交媒體/博客公開進度 (#100DaysOfCode)</option>
                                <option value="找學習夥伴 (Study Buddy)">找學習夥伴 (Study Buddy)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">計畫呈現格式</label>
                            <select name="Plan_Format" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="Markdown 表格 (週次/天數/內容)">Markdown 表格 (週次/天數/內容)</option>
                                <option value="條列式清單 (Bullet points)">條列式清單 (Bullet points)</option>
                                <option value="心智圖結構 (Mindmap style)">心智圖結構 (Mindmap style)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">計畫語氣</label>
                            <select name="Tone" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="嚴格教練風 (Pushy & Strict)">嚴格教練風 (Pushy & Strict)</option>
                                <option value="溫和鼓勵風 (Supportive)">溫和鼓勵風 (Supportive)</option>
                                <option value="客觀專業風 (Professional & Direct)">客觀專業風 (Professional & Direct)</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">主要學習障礙</label>
                            <input type="text" name="Obstacles" placeholder="例如：下班後太累、容易分心..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-gray-700">自我評估方式</label>
                            <select name="Assessment_Method" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                                <option value="">請選擇...</option>
                                <option value="完成小測驗 (Quizzes)">完成小測驗 (Quizzes)</option>
                                <option value="能向別人解釋該概念 (Feynman Technique)">能向別人解釋該概念 (Feynman Technique)</option>
                                <option value="成功運行程式碼無 Error">成功運行程式碼無 Error</option>
                            </select>
                        </div>
                    </div>
                </div>

            </form>

            <!-- Action Buttons -->
            <div class="mt-10 pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4">
                <button type="button" onclick="handleAction('share')" class="flex-1 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    手機分享
                </button>
                <button type="button" onclick="handleAction('copy')" class="flex-1 flex items-center justify-center bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-6 rounded-xl border-2 border-gray-200 transition transform active:scale-98">
                    結構化複製
                </button>
                <button type="button" onclick="handleAction('narrative')" class="flex-1 flex items-center justify-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-6 rounded-xl transition shadow-lg transform active:scale-98">
                    轉為敘述並複製
                </button>
            </div>

            <!-- 終極保險：結果顯示框 (預設隱藏，撳掣後顯示) -->
            <div id="result-box" class="hidden mt-8 p-6 bg-gray-50 rounded-xl border border-gray-200 shadow-inner">
                <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                    <span>✨ 生成結果</span>
                    <span class="ml-2 text-xs font-normal text-gray-500">(如無法自動複製，請手動全選下方文字)</span>
                </h3>
                <textarea id="final-prompt-text" class="w-full h-64 p-4 text-sm font-mono text-gray-800 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" readonly></textarea>
            </div>
        </div>
    </div>

    <script>
        // Mode Switching Logic
        function setMode(mode) {
            const advancedSection = document.getElementById('advanced-section');
            const btnSimple = document.getElementById('btn-simple');
            const btnDetailed = document.getElementById('btn-detailed');

            if (mode === 'simple') {
                advancedSection.classList.add('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
            } else {
                advancedSection.classList.remove('hidden');
                btnSimple.className = "px-4 py-2 rounded-md text-sm font-medium transition-all text-indigo-200 hover:text-white";
                btnDetailed.className = "px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-indigo-900 shadow-sm";
            }
        }

        function generatePrompt() {
            const form = document.getElementById('prompt-form');
            const formData = new FormData(form);
            let contextParts = [];
            const baseRequest = "我點樣進步我既IT skills & knowledge 3day/wk, 每日1hr";
            
            for (let [key, value] of formData.entries()) {
                if(value && value.trim() !== "") {
                    let readableKey = key.replace(/_/g, ' ');
                    contextParts.push(`### ${readableKey}\n${value}`);
                }
            }

            return `
# 🚀 Expert Prompt Request
**Task**: ${baseRequest}

---
## 📋 Context & Requirements
The following details define the scope and style of the response:

${contextParts.join('\n\n')}

---
## 🎯 Output Instruction
Please act as a world-class expert in this field. Analyze the requirements above and provide a comprehensive, high-quality response that strictly adheres to the constraints and tone specified.
`.trim();
        }

        async function handleAction(type) {
            let promptText = "";
            const baseRequest = "我點樣進步我既IT skills & knowledge 3day/wk, 每日1hr";
            const resultBox = document.getElementById('result-box');
            const finalPromptText = document.getElementById('final-prompt-text');
            
            // 1. 準備要複製/分享嘅文字
            if (type === 'narrative') {
                const form = document.getElementById('prompt-form');
                const formData = new FormData(form);
                let details = [];
                
                for (let [key, value] of formData.entries()) {
                    if(value && value.trim() !== "") {
                        let readableKey = key.replace(/_/g, ' ');
                        details.push(`關於「${readableKey}」請設定為「${value}」`);
                    }
                }
                
                promptText = baseRequest;
                if(details.length > 0) {
                    promptText += `並參考以下條件：\n${details.join('；\n')}。`;
                }
            } else {
                promptText = generatePrompt();
            }

            // 2. 顯示結果框 (雙重保險)
            finalPromptText.value = promptText;
            resultBox.classList.remove('hidden');

            // 3. 執行動作
            if (type === 'share') {
                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'Super Prompt', 
                            text: promptText 
                        }); 
                    } catch (err) { 
                        console.log('分享已取消或失敗', err); 
                    }
                } else {
                    alert('你的瀏覽器暫時不支援原生分享，請直接複製下方文字框內容。');
                }
            } else {
                // 嘗試複製
                try {
                    // 新版 API
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(promptText);
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    } else {
                        // 舊版 Fallback
                        finalPromptText.select();
                        document.execCommand('copy');
                        alert(type === 'narrative' ? '✅ 敘述型條件已成功複製！' : '✅ 結構化 Prompt 已成功複製！');
                    }
                } catch (err) {
                    alert('⚠️ 自動複製被瀏覽器阻擋，請手動長按下方文字框進行複製。');
                    console.error('複製失敗:', err);
                }
            }
        }
    </script>
</body>
</html>
